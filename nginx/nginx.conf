# =============================================================================
# Nginx — Mwamba Taxi Production
# Gère : HTTP → HTTPS redirect, WebSocket upgrade, static/media files
# =============================================================================

upstream daphne {
    server web:8000;
}

# ---------------------------------------------------------------------------
# Redirect HTTP → HTTPS
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Permet à Certbot de valider le domaine
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# HTTPS + API + WebSocket
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    server_name VOTRE_DOMAINE_OU_IP;

    # --- Certificats SSL (Certbot ou auto-signé) ---
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    # --- Fichiers statiques (servis directement par Nginx) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # --- Fichiers media (uploads) ---
    location /media/ {
        alias /app/mediafiles/;
        expires 7d;
    }

    # --- WebSockets (Django Channels) ---
    location /ws/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;   # 24h — garde la connexion WS ouverte
    }

    # --- API REST (toutes les autres routes) ---
    location / {
        proxy_pass http://daphne;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
