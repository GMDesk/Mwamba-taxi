# =============================================================================
# Nginx — Mwamba Taxi Production
# Domaine: mwambataxi.com | IP: 34.62.184.191
# Gère : HTTP→HTTPS, WebSocket upgrade, static/media, rate limiting, sécurité
# =============================================================================

upstream daphne {
    server backend:8000;
    keepalive 32;
}

# ─── Rate limiting zones ─────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=webhooks:10m rate=20r/s;

# ─── HTTP → HTTPS redirect ──────────────────────────────────────────
server {
    listen 80;
    server_name mwambataxi.com www.mwambataxi.com 34.62.184.191;

    # Certbot webroot validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS principal ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name mwambataxi.com www.mwambataxi.com 34.62.184.191;

    # --- SSL ---
    ssl_certificate     /etc/letsencrypt/live/mwambataxi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mwambataxi.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # --- Sécurité headers ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    client_max_body_size 20M;

    # --- Gzip compression ---
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # --- Health check (pas de rate limit, pas de log) ---
    location = /api/health/ {
        proxy_pass http://daphne;
        proxy_set_header Host $host;
        access_log off;
    }

    # --- Fichiers statiques (30 jours cache) ---
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Fichiers media (7 jours cache) ---
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # --- WebSockets (Django Channels) ---
    location /ws/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;   # 24h — garde la connexion WS ouverte
        proxy_send_timeout 86400;
    }

    # --- Auth endpoints (rate limit strict) ---
    location /api/v1/auth/ {
        limit_req zone=auth burst=10 nodelay;

        proxy_pass http://daphne;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- PawaPay webhooks (pas d'auth, rate limit modéré) ---
    location /api/v1/payments/pawapay/ {
        limit_req zone=webhooks burst=30 nodelay;

        proxy_pass http://daphne;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API REST (toutes les autres routes) ---
    location / {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://daphne;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # --- Bloquer l'accès aux fichiers cachés ---
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

