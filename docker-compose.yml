services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: mwamba_taxi
      POSTGRES_USER: mwamba
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mwamba -d mwamba_taxi"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://mwamba:${DB_PASSWORD:-changeme_in_production}@db:5432/mwamba_taxi
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media

  celery_worker:
    build: ./backend
    restart: always
    command: celery -A config worker -l info --concurrency=4
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://mwamba:${DB_PASSWORD:-changeme_in_production}@db:5432/mwamba_taxi
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build: ./backend
    restart: always
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgres://mwamba:${DB_PASSWORD:-changeme_in_production}@db:5432/mwamba_taxi
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/var/www/static:ro
      - media_files:/var/www/media:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  static_files:
  media_files:
